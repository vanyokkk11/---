<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚬 КУРИЛЬЩИК: 500 000 СИГАРЕТ 🚬</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e1a14 0%, #0c0a07 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        /* главный контейнер — прокуренная комната */
        .smoke-container {
            background: rgba(25, 20, 15, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            border: 2px solid #e09d32;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,140,0,0.2);
            padding: 25px 28px 35px;
            width: 780px;
            max-width: 100%;
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px dashed #e09d32;
            padding-bottom: 12px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffbc6e, #e07c1f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px #a34500;
        }

        .goal-badge {
            background: #2c2418;
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 0.85rem;
            border: 1px solid #ffb347;
            color: #ffcf9a;
        }

        /* панель статистики */
        .stats-panel {
            background: #1a140eaa;
            border-radius: 44px;
            padding: 16px 20px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #ffa559;
        }

        .stat {
            background: #0e0b07;
            border-radius: 32px;
            padding: 8px 16px;
            flex: 1;
            min-width: 110px;
            text-align: center;
            box-shadow: inset 0 1px 2px #ff9f4a33, 0 4px 8px black;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #e2bc7c;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffbc6e;
            line-height: 1;
        }

        /* зона сигареты */
        .cigarette-area {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .cigarette {
            background: radial-gradient(ellipse at 30% 40%, #f5e2c0, #c68b3c);
            width: 210px;
            height: 210px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 -8px 0 #8b5a2b, inset 0 5px 15px #ffe1a0;
            transition: 0.07s linear;
            font-size: 3.5rem;
            border: 2px solid #f0a34b;
            color: #fff0cc;
            text-shadow: 2px 2px 0 #804a1a;
        }

        .cigarette:active {
            transform: scale(0.93);
            box-shadow: 0 5px 12px black;
        }

        .cigarette span {
            font-size: 1rem;
            background: #00000077;
            padding: 4px 14px;
            border-radius: 30px;
            margin-top: 12px;
        }

        /* улучшения */
        .upgrades-section {
            background: #0f0c08aa;
            border-radius: 36px;
            padding: 18px;
            margin-top: 15px;
            border: 1px solid #e09d32;
        }

        .section-title {
            font-size: 1.2rem;
            text-align: center;
            color: #ffcf8a;
            margin-bottom: 15px;
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .upgrade-card {
            background: #1f1810e6;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 8px solid #f28b2e;
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: bold;
            color: #ffcf9a;
        }

        .upgrade-desc {
            font-size: 0.7rem;
            color: #bda37a;
        }

        .upgrade-price {
            background: #2f241a;
            padding: 4px 12px;
            border-radius: 32px;
            font-weight: bold;
            color: #ffbc6e;
        }

        .buy-btn {
            background: #6e4d2c;
            border: none;
            color: #ffdeaa;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
        }

        .buy-btn:hover:not(:disabled) {
            background: #e6952e;
            color: #1e150c;
            transform: scale(0.96);
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #442f1f;
            border: 1px solid #ff8c42;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-size: 1rem;
        }

        .float-smoke {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.4rem;
            background: radial-gradient(circle, #ffd9a5, #ffa947);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 4px orange;
            animation: floatUp 0.9s forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(0.7);}
            100% { opacity: 0; transform: translateY(-100px) scale(1.3);}
        }

        .smoke-puff {
            animation: puff 0.2s ease;
        }

        @keyframes puff {
            0% { filter: drop-shadow(0 0 0px #ffaa66); transform: scale(1);}
            50% { filter: drop-shadow(0 0 18px #ff884d); transform: scale(1.05);}
        }

        .warning {
            color: #ffae70;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="smoke-container">
    <div class="header">
        <div class="title">🚬 КУРИЛЬЩИК: 500 000 🚬</div>
        <div class="goal-badge" id="goalStatus">🎯 0 / 500 000</div>
    </div>

    <div class="stats-panel">
        <div class="stat">
            <div class="stat-label">🚬 ВЫКУРЕНО</div>
            <div class="stat-value" id="smokedCount">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">💨 ЗА ЗАТЯЖКУ</div>
            <div class="stat-value" id="powerPerPuff">1</div>
        </div>
        <div class="stat">
            <div class="stat-label">⏱️ АВТО/СЕК</div>
            <div class="stat-value" id="autoPerSec">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">🔥 СТАЖ (уровень)</div>
            <div class="stat-value" id="smokerLevel">1</div>
        </div>
    </div>

    <div class="cigarette-area">
        <div class="cigarette" id="cigClicker">
            🚬💨
            <span>ЗАТЯНУТЬСЯ</span>
        </div>
    </div>

    <div class="upgrades-section">
        <div class="section-title">💨 УЛУЧШЕНИЯ ДЛЯ МАРАФОНА</div>
        <div class="upgrade-list" id="upgradesContainer"></div>
        <button id="resetGameBtn" class="buy-btn reset-btn">🔄 НАЧАТЬ ЗАНОВО</button>
        <div class="warning">⚠️ ЦЕЛЬ: 500 000 СИГАРЕТ. КАЖДАЯ ЗАТЯЖКА = 1 СИГАРЕТА</div>
    </div>
</div>

<script>
    // ========== ИГРОВЫЕ ДАННЫЕ ==========
    let totalSmoked = 0;           // выкурено сигарет
    let puffPower = 1;             // сколько сигарет даёт одна затяжка
    let autoIncome = 0;            // автоматический доход в секунду
    let smokerLevel = 1;           // уровень (за каждые 10к сигарет + бонус)
    
    // список улучшений
    const upgrades = [
        { id: "strong_puff", name: "💪 Глубокая затяжка", desc: "+1 сигарета за клик", basePrice: 80, priceMultiplier: 1.6, type: "click_add", value: 1, level: 0 },
        { id: "pack_machine", name: "📦 Пачка за раз", desc: "+5 сигарет за клик", basePrice: 450, priceMultiplier: 1.8, type: "click_add", value: 5, level: 0 },
        { id: "auto_lighter", name: "🔥 Автозажигалка", desc: "+3 сигареты/сек", basePrice: 200, priceMultiplier: 1.7, type: "passive_add", value: 3, level: 0 },
        { id: "smoke_robot", name: "🤖 Робот-курильщик", desc: "+15 сигарет/сек", basePrice: 1200, priceMultiplier: 1.9, type: "passive_add", value: 15, level: 0 },
        { id: "double_puff", name: "⚡ Двойная тяга", desc: "x2 к силе затяжки", basePrice: 2500, priceMultiplier: 2.2, type: "click_mult", value: 2, level: 0, isMultiplier: true }
    ];
    
    // DOM элементы
    const smokedSpan = document.getElementById('smokedCount');
    const powerSpan = document.getElementById('powerPerPuff');
    const autoSpan = document.getElementById('autoPerSec');
    const levelSpan = document.getElementById('smokerLevel');
    const goalSpan = document.getElementById('goalStatus');
    const cigDiv = document.getElementById('cigClicker');
    const upgradesContainer = document.getElementById('upgradesContainer');
    const resetBtn = document.getElementById('resetGameBtn');
    
    let autoInterval = null;
    
    // обновление UI и пересчет силы клика + пассивки
    function refreshStats() {
        // клик сила (аддитив + мультипликатор)
        let clickAdd = 1;
        let clickMulti = 1;
        upgrades.forEach(up => {
            if (up.type === "click_add" && up.level > 0) clickAdd += up.value * up.level;
            if (up.isMultiplier && up.level > 0) clickMulti *= Math.pow(up.value, up.level);
        });
        let finalPower = clickAdd * clickMulti;
        puffPower = finalPower;
        powerSpan.innerText = finalPower;
        
        // пассивный доход
        let passiveTotal = 0;
        upgrades.forEach(up => {
            if (up.type === "passive_add" && up.level > 0) passiveTotal += up.value * up.level;
        });
        autoIncome = passiveTotal;
        autoSpan.innerText = autoIncome;
        
        // отображение прогресса к цели 500 000
        let percent = (totalSmoked / 500000) * 100;
        goalSpan.innerText = `🎯 ${Math.floor(totalSmoked).toLocaleString()} / 500 000 (${percent.toFixed(1)}%)`;
        smokedSpan.innerText = Math.floor(totalSmoked).toLocaleString();
        
        // уровень курильщика (за каждые 10 000 сигарет +1 уровень)
        let newLevel = Math.floor(totalSmoked / 10000) + 1;
        if (newLevel !== smokerLevel) {
            smokerLevel = newLevel;
            levelSpan.innerText = smokerLevel;
            addFloatingText(`🌟 УРОВЕНЬ ${smokerLevel}! СТАЖ РАСТЕТ! 🌟`, "#ffc285");
        } else {
            levelSpan.innerText = smokerLevel;
        }
        
        // Проверка победы
        if (totalSmoked >= 500000) {
            winGame();
        }
    }
    
    // функция победы
    function winGame() {
        if (window.gameWon) return;
        window.gameWon = true;
        if (autoInterval) clearInterval(autoInterval);
        addFloatingText("🏆🏆🏆 500 000 СИГАРЕТ! ВЫ ЛЕГЕНДА! 🏆🏆🏆", "#ffdd99");
        alert("🔥 ПОЗДРАВЛЯЮ! ТЫ ВЫКУРИЛ 500 000 СИГАРЕТ! 🔥\nМИРОВОЙ РЕКОРД У ТЕБЯ В КАРМАНЕ!");
        cigDiv.style.filter = "drop-shadow(0 0 15px gold)";
        cigDiv.style.opacity = "0.9";
    }
    
    // цена улучшения
    function getUpgradePrice(up) {
        if (up.level === 0) return up.basePrice;
        return Math.floor(up.basePrice * Math.pow(up.priceMultiplier, up.level));
    }
    
    // покупка улучшения
    function buyUpgrade(index) {
        const up = upgrades[index];
        const price = getUpgradePrice(up);
        if (totalSmoked >= price) {
            totalSmoked -= price;
            up.level++;
            refreshStats();
            updateShopUI();
            restartAutoIncome();
            addFloatingText(`✅ ${up.name} куплен!`, "#ffbc6e");
            saveGameToLocal();
        } else {
            addFloatingText(`❌ Не хватает ${price} выкуренных сигарет!`, "#ffaa77", true);
        }
    }
    
    // отрисовать магазин
    function updateShopUI() {
        upgradesContainer.innerHTML = '';
        upgrades.forEach((up, idx) => {
            const price = getUpgradePrice(up);
            let levelText = up.level > 0 ? ` lvl ${up.level}` : '';
            let effectDesc = "";
            if (up.type === "click_add") effectDesc = `+${up.value}/затяжку`;
            else if (up.type === "passive_add") effectDesc = `+${up.value}/сек`;
            else if (up.isMultiplier) effectDesc = `x${up.value} к затяжке`;
            
            const card = document.createElement('div');
            card.className = 'upgrade-card';
            card.innerHTML = `
                <div class="upgrade-info">
                    <div class="upgrade-name">${up.name}${levelText}</div>
                    <div class="upgrade-desc">${up.desc} (${effectDesc})</div>
                </div>
                <div class="upgrade-price">🚬 ${Math.floor(price)}</div>
                <button class="buy-btn" data-idx="${idx}">ВЗЯТЬ</button>
            `;
            upgradesContainer.appendChild(card);
        });
        
        document.querySelectorAll('.buy-btn[data-idx]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                buyUpgrade(idx);
            });
        });
    }
    
    // затяжка (клик)
    function takePuff() {
        if (totalSmoked >= 500000 && !window.gameWon) winGame();
        if (totalSmoked >= 500000) return;
        
        let gain = puffPower;
        totalSmoked += gain;
        if (totalSmoked > 500000) totalSmoked = 500000;
        refreshStats();
        
        // анимация
        cigDiv.classList.add('smoke-puff');
        setTimeout(() => cigDiv.classList.remove('smoke-puff'), 150);
        addFloatingText(`+${Math.floor(gain)} 🚬`, "#ffbb77");
        saveGameToLocal();
        
        if (totalSmoked >= 500000) winGame();
    }
    
    // пассивный авто-доход
    function startAutoIncome() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (totalSmoked >= 500000) return;
            if (autoIncome > 0) {
                totalSmoked += autoIncome;
                if (totalSmoked > 500000) totalSmoked = 500000;
                refreshStats();
                if (Math.random() < 0.2) addFloatingText(`💨 +${autoIncome} авто`, "#ffaa77");
                saveGameToLocal();
                if (totalSmoked >= 500000) winGame();
            }
        }, 1000);
    }
    
    function restartAutoIncome() {
        if (autoInterval) clearInterval(autoInterval);
        startAutoIncome();
    }
    
    // плавающий текст
    function addFloatingText(text, color = "#ffd49f", isError = false) {
        const floatDiv = document.createElement('div');
        floatDiv.className = 'float-smoke';
        floatDiv.innerText = text;
        floatDiv.style.color = isError ? "#ffaa88" : color;
        floatDiv.style.left = (Math.random() * 70 + 15) + '%';
        floatDiv.style.top = (Math.random() * 50 + 20) + '%';
        document.body.appendChild(floatDiv);
        setTimeout(() => floatDiv.remove(), 800);
    }
    
    // сохранение / загрузка
    function saveGameToLocal() {
        const save = {
            totalSmoked: totalSmoked,
            upgradesState: upgrades.map(up => ({ level: up.level })),
            smokerLevel: smokerLevel
        };
        localStorage.setItem('cigarette500kSave', JSON.stringify(save));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('cigarette500kSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                totalSmoked = data.totalSmoked || 0;
                if (data.upgradesState && data.upgradesState.length === upgrades.length) {
                    upgrades.forEach((up, idx) => {
                        up.level = data.upgradesState[idx].level || 0;
                    });
                }
                smokerLevel = data.smokerLevel || 1;
                refreshStats();
                updateShopUI();
                restartAutoIncome();
                addFloatingText("📦 Дымное сохранение загружено", "#d9a13b");
                if (totalSmoked >= 500000) winGame();
            } catch(e) { console.warn(e); }
        } else {
            refreshStats();
            updateShopUI();
            startAutoIncome();
        }
    }
    
    // сброс игры
    function resetGame() {
        if (confirm("ВЫКИНУТЬ ПАЧКУ? ВСЁ СГОРИТ ДОТЛА (прогресс удалится)!")) {
            totalSmoked = 0;
            upgrades.forEach(up => up.level = 0);
            smokerLevel = 1;
            window.gameWon = false;
            refreshStats();
            updateShopUI();
            restartAutoIncome();
            saveGameToLocal();
            addFloatingText("🔥 НОВАЯ ПАЧКА! С 0 СИГАРЕТ 🔥", "#ffbb88");
            cigDiv.style.filter = "";
            cigDiv.style.opacity = "1";
        }
    }
    
    // события
    cigDiv.addEventListener('click', takePuff);
    resetBtn.addEventListener('click', resetGame);
    loadGame();
</script>
</body>
</html>
